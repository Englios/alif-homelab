apiVersion: v1
kind: Config
clusters:
- cluster:
    certificate-authority-data: <CA_CERT_BASE64>
    server: https://<TAILSCALE_IP>:6443
  name: homelab
contexts:
- context:
    cluster: homelab
    user: <BOT_IDENTITY_NAME>
  name: <CONTEXT_NAME>
current-context: <CONTEXT_NAME>
users:
- name: <BOT_IDENTITY_NAME>
  user:
    exec:
      apiVersion: client.authentication.k8s.io/v1
      command: kubectl
      args:
      - oidc-login
      - get-token
      - --grant-type=client-credentials
      - --oidc-issuer-url=https://<OIDC_TAILSCALE_HOSTNAME>/realms/homelab
      - --oidc-client-id=homelab-automation-bot
      - --oidc-client-secret=<OIDC_CLIENT_SECRET>
      - --certificate-authority=/etc/homelab/oidc/ca.crt
      - --oidc-extra-scope=openid
      - --oidc-extra-scope=profile
      - --oidc-extra-scope=email
      interactiveMode: Never
