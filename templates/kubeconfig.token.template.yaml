apiVersion: v1
kind: Config
clusters:
- cluster:
    certificate-authority-data: <CA_CERT_BASE64>
    server: https://<TAILSCALE_IP>:6443
  name: homelab
contexts:
- context:
    cluster: homelab
    user: <USER_NAME>
  name: <CONTEXT_NAME>
current-context: <CONTEXT_NAME>
users:
- name: <USER_NAME>
  user:
    token: <BEARER_TOKEN>
