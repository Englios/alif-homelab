---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: aitrade-prod
  namespace: flux-system
spec:
  # Suspended until the staged cutover is complete.
  # Resume only after verifying the aitrade GitRepository clones
  # successfully and the control Kustomization (aitrade-flux) is healthy.
  suspend: true
  interval: 5m0s
  path: ./.kube/overlays/prod
  prune: true
  wait: true
  timeout: 5m0s
  sourceRef:
    kind: GitRepository
    name: aitrade
