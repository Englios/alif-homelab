---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vaultwarden
  namespace: flux-system
spec:
  # Prereqs (all confirmed):
  #   1. Flux bootstrap complete (sops-age Secret in flux-system).
  #   2. vaultwarden-secrets.sops.yaml encrypted and committed.
  #   3. node-pool=system label applied to the Debian control plane.
  #   4. Tailscale Kubernetes Operator running, registered, and able to
  #      provision devices. Vaultwarden's Service carries the
  #      tailscale.com/expose annotation, so the operator will create a
  #      Tailscale device for it on first reconcile.
  # After this commit, the kustomize-controller will create the
  # namespace, PVC, Deployment, Service, NetworkPolicy, and CronJob,
  # and the Tailscale operator will expose the Service.
  suspend: false
  interval: 10m0s
  path: ./infrastructure/vaultwarden
  prune: true
  wait: true
  timeout: 5m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  # SOPS decryption: uses the same sops-age Secret as aitrade-flux.
  decryption:
    provider: sops
    secretRef:
      name: sops-age
