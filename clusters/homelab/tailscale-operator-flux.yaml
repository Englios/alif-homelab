---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tailscale-operator
  namespace: flux-system
spec:
  # Bootstrap: chart install path is now confirmed working, auth key is
  # encrypted, kustomize namespace override is removed, NetworkPolicy
  # allows the operator's proxy pod. Reconciliation is autonomous from
  # here; flip suspend: true only when intentionally pausing the operator.
  suspend: false
  interval: 30m
  path: ./infrastructure/tailscale-operator
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
