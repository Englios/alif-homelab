# Strategic-merge patches to pin Flux controllers to the homelab `system`
# node pool. Consumed by `flux-system/kustomization.yaml` AFTER
# `flux bootstrap` generates the controller manifests.
#
# IMPORTANT: Apply the labels on the node(s) BEFORE resuming the
# `flux-system` Kustomization. See `clusters/homelab/node-labels.md`.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: source-controller
  namespace: flux-system
spec:
  template:
    spec:
      nodeSelector:
        homelab.englios.dev/node-pool: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kustomize-controller
  namespace: flux-system
spec:
  template:
    spec:
      nodeSelector:
        homelab.englios.dev/node-pool: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helm-controller
  namespace: flux-system
spec:
  template:
    spec:
      nodeSelector:
        homelab.englios.dev/node-pool: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-controller
  namespace: flux-system
spec:
  template:
    spec:
      nodeSelector:
        homelab.englios.dev/node-pool: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-reflector-controller
  namespace: flux-system
spec:
  template:
    spec:
      nodeSelector:
        homelab.englios.dev/node-pool: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-automation-controller
  namespace: flux-system
spec:
  template:
    spec:
      nodeSelector:
        homelab.englios.dev/node-pool: system
