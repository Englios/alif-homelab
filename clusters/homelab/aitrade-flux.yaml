---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: aitrade-flux
  namespace: flux-system
spec:
  # Live: applied by the homelab-managed Flux on the homelab cluster.
  # Initial cutover was completed; the suspend flag is removed so future
  # ai-trade master commits are picked up automatically.
  suspend: false
  interval: 10m0s
  path: ./aitrade
  prune: true
  wait: true
  timeout: 5m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  # SOPS decryption: the sops-age Secret must contain the age private key
  # in the format expected by the Flux SOPS provider:
  #   kubectl -n flux-system create secret generic sops-age \
  #     --from-file=age.agekey=<path-to-age-key>
  decryption:
    provider: sops
    secretRef:
      name: sops-age
