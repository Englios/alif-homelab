---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  releaseName: tailscale-operator
  chart:
    spec:
      chart: tailscale-operator
      version: "1.98.4"
      sourceRef:
        kind: HelmRepository
        name: ts-charts
        namespace: flux-system
  interval: 30m
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: false
  # The chart at https://pkgs.tailscale.com/helmcharts authenticates
  # via OAuth. The OAuth client credentials live in the encrypted
  # Secret/operator-oauth in the 'tailscale' namespace; their values
  # never appear in this file or in git.
  values:
    operatorConfig:
      hostname: tailscale-operator
      # Override the chart's default of 'tag:k8s-operator' to match the
      # OAuth client's tag (tag:k8s). The operator creates auth keys
      # with this tag; the OAuth client must own the tag or the
      # Tailscale API returns 403 on the auth-key creation call.
      defaultTags:
        - tag:k8s
  valuesFrom:
    - kind: Secret
      name: operator-oauth
      valuesKey: client_id
      targetPath: oauth.clientId
    - kind: Secret
      name: operator-oauth
      valuesKey: client_secret
      targetPath: oauth.clientSecret
