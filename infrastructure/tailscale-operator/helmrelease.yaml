---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  releaseName: tailscale-operator
  chart:
    spec:
      chart: tailscale-operator
      version: "1.86.0"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
  interval: 30m
  install:
    createNamespace: true
  upgrade:
    cleanupOnFail: false
  values:
    operatorConfig:
      hostname: tailscale-operator
    # The Tailscale auth key is read from the encrypted
    # Secret/tailscale-operator-auth in the 'tailscale' namespace via
    # extraEnv. The key value never appears in this file or in git.
    extraEnv:
      - name: TS_AUTH_KEY
        valueFrom:
          secretKeyRef:
            name: tailscale-operator-auth
            key: TS_AUTH_KEY
