---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vaultwarden-data
  namespace: vaultwarden
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # If your cluster provides a default StorageClass it will be used.
  # To pin a specific class, uncomment:
  # storageClassName: <your-storage-class>
