apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vaultwarden
resources:
  - namespace.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
  - backup-cronjob.yaml
  # Encrypted Secret. Must exist and be encrypted with the age key whose
  # public counterpart is in ../../../.sops.yaml. Source: the example at
  # ../../clusters/homelab/secrets/vaultwarden-secrets.sops.yaml.example.
  - ../../clusters/homelab/secrets/vaultwarden-secrets.sops.yaml
patches:
  - path: patches/deployment-node-selector.yaml

