---
apiVersion: v1
kind: Service
metadata:
  name: vaultwarden
  namespace: vaultwarden
  labels:
    app.kubernetes.io/name: vaultwarden
    app.kubernetes.io/instance: vaultwarden
  annotations:
    # Tailscale Kubernetes Operator picks this Service up and creates
    # a Tailscale device with MagicDNS name 'vaultwarden' (or the
    # override below). The default hostname matches the Service name.
    tailscale.com/expose: "true"
    tailscale.com/hostname: "vaultwarden"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: ws
      port: 3012
      targetPort: 3012
      protocol: TCP
  selector:
    app.kubernetes.io/name: vaultwarden
    app.kubernetes.io/instance: vaultwarden
